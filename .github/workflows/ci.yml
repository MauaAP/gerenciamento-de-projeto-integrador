# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [prod, dev]
  pull_request:
    branches: [prod, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || echo "No lint script defined"

      - name: Run unit tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Upload coverage (optional)
        if: success()
        run: |
          if [ -d coverage ]; then
            bash <(curl -s https://codecov.io/bash)
          fi
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Check formatting (optional)
        run: npm run format || echo "No format script defined"
